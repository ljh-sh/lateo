<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/install' | relative_url }}">Install</a>
        <a href="{{ '/cli' | relative_url }}">CLI</a>
        <a href="{{ '/recipes' | relative_url }}">Recipes</a>
        <a href="{{ '/why' | relative_url }}">Why</a>
        <a href="https://github.com/ljh-sh/lateo" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <article class="page-content">
      {{ content }}
    </article>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>lateo is open source under <a href="https://github.com/ljh-sh/lateo/blob/main/LICENSE" target="_blank" rel="noopener">Apache 2.0</a>. Name: Latin <em>lateo</em> — "I lie hidden".</p>
    </div>
  </footer>
</body>
</html>
